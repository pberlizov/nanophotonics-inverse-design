# Sprint v2 broadband — verify Phase2 explore, refine from latent_meep_00182, higher flatness.
# Hypothesis: coarse objective 0.122 is promising; fine 5nm grid + flatness=0.65 closes gate.

phase: sprint_v2
targets:
  split_ratio_1550: 0.5
  split_ratio_tolerance: 0.05
  max_insertion_loss_db: 12.0

meep:
  recipe_version: phase0_v1
  resolution: 25
  mask_flip_y: true

data:
  root: data/phase0
  manifest: data/phase0/manifest.csv

search:
  objective: broadband
  weight_split: 1.0
  weight_il: 0.10
  flatness_weight: 0.65
  drc_penalty: 1.0

broadband:
  wl_start: 1.53
  wl_stop: 1.57
  wl_step: 0.005
  verify_wl_step: 0.005
  max_worst_split_error: 0.05

hunt:
  output_dir: data/phase1/sprint_broadband_v2
  refine_trials_per_center: 50
  residual_dims: 16
  residual_bound: 0.035
  latent_mode: residual
  center_latents:
    - data/phase1/phase2_broadband_hunt/explore/candidates/latents/latent_meep_00182_latent.npy
    - data/phase1/phase2_broadband_hunt/explore/candidates/latents/latent_meep_00101_latent.npy

track_b:
  latent_meep_search:
    output_dir: data/phase1/sprint_broadband_v2/explore
    objective: broadband
    latent_mode: perlin
    n_trials_full: 100
