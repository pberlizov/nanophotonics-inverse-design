# Wedge A ranker — mask_mlp on perturb-only (best historical val_r2 ~ -0.42)
base_config: configs/wedge_a.yaml

surrogate:
  architecture: mask_mlp
  source_filter: perturb_plus_search
  target: split_ratio_upper
  output_dir: data/phase1/wedge_a/surrogate_mask_perturb
  min_ok: 80
  mask_pool: 6
  hidden: "256,128,64"
  max_iter: 800

ranking_gate:
  require_ranking_wins: true
