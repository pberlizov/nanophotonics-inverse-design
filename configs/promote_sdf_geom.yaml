# Promotion validation for phase0_v1_sdf_geom (mesh-stable audit recipe)

promote:
  recipe_version: phase0_v1_sdf_geom
  sdf_smooth_um: 0.04
  replaces_mesh_stable: phase0_v1_refgrid100n

gate:
  max_mesh_gap: 0.03
  max_prod_delta: 0.03
