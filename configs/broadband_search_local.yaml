# Local σ-refinement with C-band broadband objective (phase0_v1).
# Search uses a coarse λ grid (5 points); verify winners with champion_broadband_sweep --wl-step 0.005.

phase: 0
device: power_splitter_50_50

targets:
  split_ratio_1550: 0.5
  split_ratio_tolerance: 0.05
  max_insertion_loss_db: 12.0

meep:
  recipe_version: phase0_v1
  resolution: 25
  mask_flip_y: true

data:
  root: data/phase0
  manifest: data/phase0/manifest.csv

search:
  objective: broadband
  weight_split: 1.0
  weight_il: 0.15
  drc_penalty: 1.0
  flatness_weight: 0.35

broadband:
  wl_start: 1.53
  wl_stop: 1.57
  wl_step: 0.01
  max_worst_split_error: 0.05
